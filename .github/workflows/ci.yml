name: CI

# Dependabot 会开 PR，但部署工作流只在 push 到 main 时跑，
# PR 阶段没有任何验证。这个工作流负责在合并前确认还能编译。
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # generated.ts 是提交进仓库的，改了 .md 却忘了重新生成的话在这里拦下来。
      - name: Check generated vegetable data is up to date
        run: npm run check:data

      - name: Typecheck
        run: npm run typecheck

      - name: Build static export
        run: npm run build
